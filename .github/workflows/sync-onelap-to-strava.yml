name: Sync Onelap → Strava

on:
  schedule:
    - cron: "17 2 * * *" # daily ~10:17 AM UTC+8
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync Onelap to Strava
        run: pnpm tsx scripts/sync-onelap-to-strava.ts
        env:
          ONELAP_USERNAME: ${{ secrets.ONELAP_USERNAME }}
          ONELAP_PASSWORD: ${{ secrets.ONELAP_PASSWORD }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
